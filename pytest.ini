[pytest]
addopts = -q -m "not slow"
markers =
    unit: fast deterministic checks for parser, cost-model units, signatures, and gate logic
    smoke: lightweight end-to-end checks that run the CLI/direct runner on a small sample
    regression: behavior locks for known Stage2/Stage3 fixes
    defect: synthetic defect-injection checks for bad MLIR cases
    slow: exhaustive/search-quality/integration-style checks; run explicitly with -m slow
