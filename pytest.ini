[pytest]
markers =
    unit: unit tests
    smoke: smoke tests
    regression: regression tests
    slow: long-running integration tests

# Keep plain `pytest` focused on this repository's own tests.
# vTriton snapshots can contain their own upstream tests and should be run by
# dedicated vTriton/CANN workflows, not by the pre-Linux Python gates.
norecursedirs =
    vTriton
    build
    build-*
    dist
    .git
    __pycache__
